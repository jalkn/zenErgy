<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="img/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYCELIUM TECH-LAB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    colors: { 'zenergia-black': '#0a0a0a' },
                    fontFamily: { 'sans': ['Orbitron', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { 
            font-family: 'Orbitron', sans-serif; 
            scroll-behavior: smooth; 
            letter-spacing: 0.05em; 
            background-color: #0a0a0a;
            color: #111827; 
            position: relative;
        } 

        /* Contenedor del césped con transición de opacidad para oscurecimiento radical */
        #page-bg-overlay {
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.15)), url('img/grass.png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            z-index: -1;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), filter 0.6s ease;
        }

        /* Entorno Oscuro (Indoor) activado */
        .drawer-active #page-bg-overlay {
            opacity: 0.08;
            filter: grayscale(100%) brightness(30%);
        }
        
        .glass { 
            background: rgba(10, 10, 10, 0.85); 
            border-left: 1px solid rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(30px); 
            -webkit-backdrop-filter: blur(30px);
            box-shadow: -20px 0 60px rgba(0, 0, 0, 0.8);
        }

        .drawer-btn {
            background: transparent;
            transition: all 0.4s ease;
        }

        /* Transición base para los íconos que van a encenderse */
        .img-glow-transition {
            transition: filter 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease, transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: filter, transform;
            transform: scale(1);
        }

        /* EFECTO GLOW ELÉCTRICO INTENSO (FORZADO POR HARDWARE) */
        /* Al activarse el modo Indoor, los isotipos se expanden sutilmente y proyectan luz cobalto profunda */
        .drawer-active .img-glow-transition {
            opacity: 1 !important;
            transform: scale(1.05);
            filter: brightness(1.4)
                    drop-shadow(0 0 8px rgba(0, 60, 255, 0.95)) 
                    drop-shadow(0 0 20px rgba(0, 110, 255, 0.75))
                    drop-shadow(0 0 45px rgba(0, 70, 255, 0.45));
        }

        /* Asegurar que los contenedores de los botones no recorten el efecto drop-shadow */
        .group, button {
            overflow: visible !important;
        }

        /* Sombra Maestra Estándar para la Bio-Matriz SVG */
        #mesh-container svg {
            transition: filter 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 0 25px rgba(0, 0, 0, 0.55)) 
                    drop-shadow(0 4px 12px rgba(0, 0, 0, 0.40));
        }

        .scrollbar-none::-webkit-scrollbar { display: none; }
        .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes pulse-soft {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; fill: #ffffff; filter: drop-shadow(0 0 8px #fff); }
        }
        .pulse-animation { animation: pulse-soft 2s infinite ease-in-out; }
    </style>
</head>
<body class="antialiased selection:bg-blue-900 overflow-x-hidden">

    <!-- CAPA DE FONDO INTERMITENTE (OUTDOOR / INDOOR TRANSITION) -->
    <div id="page-bg-overlay"></div>

    <!-- OVERLAY INTEGRADO DEL DRAWER -->
    <div id="drawer-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-md z-40 hidden opacity-0 transition-opacity duration-500" onclick="toggleDrawer()"></div>

    <!-- UNIVERSAL NAVIGATION BAR -->
    <nav class="fixed top-0 w-full z-50 bg-[#0a0a0a]/15 backdrop-blur-md border-b border-white/5 select-none">
        <div class="p-4 sm:p-6 grid grid-cols-3 items-center max-w-7xl mx-auto uppercase tracking-widest text-[10px] relative">
            
            <div class="flex items-center gap-3 cursor-pointer group justify-self-start p-2" onclick="window.location.href='index.html'">
                <img src="img/logo.png" class="w-6 h-6 img-glow-transition opacity-70 group-hover:opacity-100 group-hover:rotate-180" alt="Zenergia Core"> 
            </div>

            <div class="justify-self-center text-center">
                <span class="text-white/80 text-[7px] sm:text-[9px] font-black tracking-[0.45em] whitespace-nowrap drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]">
                    BIOLANDART
                </span>
            </div>
                            
            <div class="justify-self-end">
                <button id="z-dial-trigger" 
                     class="group flex items-center justify-center p-1 transition-all duration-300 focus:outline-none" 
                     onclick="toggleDrawer()"
                     aria-label="Open Navigation">
                    <img src="img/back.png" class="w-6 h-6 object-contain opacity-70 group-hover:opacity-100 group-hover:scale-105 transition-all duration-300 filter drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)]" alt="Menu Trigger">
                </button>
            </div>

        </div>
    </nav>

    <!-- DRAWER DE NAVEGACIÓN PURIFICADO (ESTILO TECH-LAB STUDIO) -->
    <div id="biokinetic-drawer" class="fixed right-0 top-0 h-full w-[260px] sm:w-[320px] z-50 transform translate-x-full transition-transform duration-500 ease-in-out glass flex flex-col justify-between select-none">
        <div>
            <!-- Cabecera del Drawer: Alineación exacta y simétrica con el NAV -->
            <div class="p-4 sm:p-6 flex justify-between items-center border-b border-white/5 w-full">
                <div class="flex items-center font-bold">
                    <div id="z-dial" 
                         class="text-white/80 font-mono font-bold text-[10px] tracking-[0.2em] border border-white/10 bg-black/40 h-[30px] w-[100px] flex items-center justify-center rounded-sm backdrop-blur-sm select-none transition-all duration-300">
                        --
                    </div>
                </div>

                <button onclick="toggleDrawer()" class="group flex items-center justify-center p-2 focus:outline-none transition-all duration-300 transform active:scale-95" aria-label="Close Navigation">
                    <img src="img/pace.png" class="w-5 h-5 object-contain img-glow-transition opacity-40 group-hover:opacity-100" alt="Close Menu">
                </button>
            </div>

            <!-- Menú Limpio y Minimalista -->
            <div class="px-8 flex flex-col gap-6 mt-10">
                
                <button onclick="scrollToSection('seasonal-node'); toggleDrawer();" class="drawer-btn w-full text-left focus:outline-none group">
                    <span class="text-[10px] font-bold tracking-[0.25em] text-white/60 group-hover:text-white group-hover:translate-x-1 block transition-all duration-300 uppercase">
                        MATRIX MASTER
                    </span>
                </button>

                <button onclick="scrollToSection('protocol'); toggleDrawer();" class="drawer-btn w-full text-left focus:outline-none group">
                    <span class="text-[10px] font-bold tracking-[0.25em] text-white/60 group-hover:text-white group-hover:translate-x-1 block transition-all duration-300 uppercase">
                        PULS PROTOCOL
                    </span>
                </button>

                <button onclick="scrollToSection('manifesto'); toggleDrawer();" class="drawer-btn w-full text-left focus:outline-none group">
                    <span class="text-[10px] font-bold tracking-[0.25em] text-white/60 group-hover:text-white group-hover:translate-x-1 block transition-all duration-300 uppercase">
                        MANIFESTO
                    </span>
                </button>

                <button onclick="scrollToSection('installation-node'); toggleDrawer();" class="drawer-btn w-full text-left focus:outline-none group">
                    <span class="text-[10px] font-bold tracking-[0.25em] text-white/60 group-hover:text-white group-hover:translate-x-1 block transition-all duration-300 uppercase">
                        GEODESIC AXIS
                    </span>
                </button>

                <button onclick="scrollToSection('dial-monitor'); toggleDrawer();" class="drawer-btn w-full text-left focus:outline-none group">
                    <span class="text-[10px] font-bold tracking-[0.25em] text-white/60 group-hover:text-white group-hover:translate-x-1 block transition-all duration-300 uppercase">
                        DIAL MONITOR
                    </span>
                </button>

                <button onclick="scrollToSection('vault'); toggleDrawer();" class="drawer-btn w-full text-left focus:outline-none group">
                    <span class="text-[10px] font-bold tracking-[0.25em] text-white/60 group-hover:text-white group-hover:translate-x-1 block transition-all duration-300 uppercase">
                        MATERIAL VAULT
                    </span>
                </button>

            </div>

            <!-- Panel de Especificaciones -->
            <div class="px-8 mt-8">
                <div id="dynamic-node-spec" class="hidden border border-white/5 bg-white/[0.02] backdrop-blur-md rounded-sm p-4 space-y-2 transition-all duration-300">
                    <div class="flex justify-between items-center border-b border-white/5 pb-2">
                        <span class="text-[7px] font-bold uppercase tracking-[0.2em] text-white/40">MESH</span>
                        <span id="spec-id" class="text-[8px] font-mono font-bold text-white/80">NODE-T1-000</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-[7px] font-bold uppercase tracking-[0.2em] text-white/40">TOKEN</span>
                        <span id="spec-hash" class="text-[8px] font-mono font-bold text-white/60">0x0000</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer Minimalista -->
        <div class="p-8 border-t border-white/5 text-[8px] text-white/30 tracking-[0.25em] font-medium text-center">
            <a href="https://github.com/jalkn/zenErgy" target="_blank" class="block uppercase hover:text-white/70 transition-colors">
                by jalkn &copy; 2026
            </a>
        </div>
    </div>

    <!-- CONTENEDOR DE LA BIO-MATRIZ -->
    <main class="max-w-7xl mx-auto px-4 sm:px-8 pt-16 sm:pt-20 pb-8 flex flex-col items-center">
        
        <section id="seasonal-node" class="relative w-full min-h-[40vh] sm:min-h-[55vh] bg-transparent flex justify-start sm:justify-center items-center overflow-x-auto overflow-y-hidden select-none py-2 scrollbar-none cursor-grab active:cursor-grabbing">
            <div id="mesh-container" class="w-full min-w-[720px] sm:min-w-0 sm:max-w-[780px] px-2 sm:px-6 relative z-10 flex justify-center items-center mx-auto transition-all duration-500">
                <!-- img/barranquero-mesh.svg loads here dynamically -->
            </div>
        </section>

        <!-- TEXTO CONCEPTUAL -->
        <div class="w-full px-4 mt-2 sm:mt-4 select-none">
            <p class="text-[9px] sm:text-[10px] text-white/80 tracking-[0.18em] font-medium max-w-lg normal-case leading-relaxed drop-shadow-[0_4px_8px_rgba(0,0,0,0.95)] text-center mx-auto">
                A physical 1:1 territorial intervention in the forest. 
                This bio-matrix traces a bird's geometric grid, transforming land-art modules into synchronized tracking anchors connected directly to our hardware ecosystem.
            </p>
        </div>

    </main>

<script>
    const $ = (id) => document.getElementById(id);
    const PHI = 1.618033;

    window.selectedNodeFromMesh = null;
    let biokineticInterval = null;

    function updateZ() {
        if (window.selectedNodeFromMesh) return;

        const now = new Date();
        const zDial = $('z-dial');
        if (!zDial) return;

        const deg = (now.getHours() * 15) + (now.getMinutes() * 0.25);
        let acciones = 'UL'; 

        if (deg >= 90 && deg < 180) {
            acciones = 'PL';  
        } 
        else if (deg >= 180 && deg < 270) {
            acciones = 'LST'; 
        } 
        else if (deg >= 270) {
            acciones = 'US';  
        }

        const setsRaw = Math.floor(Math.abs(Math.sin((deg * Math.PI) / 180)) * 6) + 2;
        const sets = String(setsRaw).padStart(2, '0');
        const repsRaw = Math.floor(((now.getMinutes() + 1) * PHI) % 8) + 3;
        const reps = String(repsRaw).padStart(2, '0');

        const setsFiltrado = parseInt(sets, 10).toString();
        const repsFiltrado = parseInt(reps, 10).toString();

        const coordenadaBiocinética = `${setsFiltrado}${acciones}${repsFiltrado}`;
        
        zDial.innerText = coordenadaBiocinética;
        zDial.classList.remove('text-emerald-400', 'border-emerald-500/20');
        zDial.classList.add('text-white/80', 'border-white/10');
    }

    function startBiokineticLoop() {
        if (biokineticInterval) clearInterval(biokineticInterval);
        updateZ(); 
        biokineticInterval = setInterval(updateZ, 1000); 
    }

    function stopBiokineticLoop() {
        if (biokineticInterval) clearInterval(biokineticInterval);
    }

    function updateTerminalTelemetry(nodeString = null) {
        const zDial = $('z-dial');
        const specPanel = $('dynamic-node-spec');

        if (nodeString) {
            stopBiokineticLoop(); 
            
            if (zDial) {
                zDial.innerText = `N${nodeString}`; 
                zDial.classList.remove('text-white/80', 'border-white/10');
                zDial.classList.add('text-emerald-400', 'border-emerald-500/30'); 
            }
            
            if (specPanel) {
                specPanel.classList.remove('hidden');
                const specId = $('spec-id');
                const specHash = $('spec-hash');
                if (specId) specId.innerText = `NODE-T1-${nodeString}`;
                if (specHash) {
                    specHash.innerText = `0x${Math.floor(Math.random() * 65535).toString(16).toUpperCase()}`;
                }
            }
        } else {
            if (specPanel) specPanel.classList.add('hidden');
            startBiokineticLoop();
        }
    }

    function toggleDrawer() {
        const drawer = $('biokinetic-drawer');
        const overlay = $('drawer-overlay');
        const body = document.body;
        
        if (drawer.classList.contains('translate-x-full')) {
            drawer.classList.remove('translate-x-full');
            overlay.classList.remove('hidden');
            body.classList.add('drawer-active'); 
            setTimeout(() => overlay.classList.add('opacity-100'), 10);
            
            updateTerminalTelemetry(window.selectedNodeFromMesh);
        } else {
            drawer.classList.add('translate-x-full');
            overlay.classList.remove('opacity-100');
            body.classList.remove('drawer-active'); 
            setTimeout(() => {
                overlay.classList.add('hidden');
                stopBiokineticLoop(); 
                window.selectedNodeFromMesh = null; 
            }, 500);
        }
    }

    function scrollToNodeID(nodeNumber) {
        const formattedNode = String(nodeNumber).padStart(3, '0');
        window.selectedNodeFromMesh = formattedNode;
        toggleDrawer();
    }

    document.addEventListener("DOMContentLoaded", () => {
        fetch('img/barranquero-mesh.svg')
            .then(response => response.text())
            .then(data => {
                const container = document.getElementById('mesh-container');
                if (container) container.innerHTML = data;
            })
            .catch(err => console.error('[-] Error loading bio-matrix:', err));
    });
</script>
</body>
</html>

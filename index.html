<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="img/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mycelium Tech-Lab // ZENERGIA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    colors: { 
                        'zenergy-blue': '#1e40af' 
                    },
                    fontFamily: { 'sans': ['Orbitron', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        /* Capa Maestra de Geolocalización Satelital - RECALIBRADA */
        body { 
            font-family: 'Orbitron', sans-serif; 
            scroll-behavior: smooth; 
            letter-spacing: 0.05em; 
            background-image: linear-gradient(rgba(0, 0, 0, 0.08), rgba(0, 0, 0, 0.08)), url('img/grass.png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: #111827; 
        } 
        
        /* Contenedores de Cristal Claro Óptico */
        .glass { 
            background: rgba(255, 255, 255, 0.65); 
            border: 1px solid rgba(255, 255, 255, 0.4); 
            backdrop-filter: blur(12px); 
        }

        /* SOMBRA DE CONTORNO MAESTRA */
        #mesh-container svg {
            filter: drop-shadow(0 0 25px rgba(0, 0, 0, 0.65)) 
                    drop-shadow(0 4px 12px rgba(0, 0, 0, 0.50));
        }
        
        /* Animación de Escaneo Láser */
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { top: 100%; opacity: 0; }
            0% { transform: translateX(-100%); }
            100% { transform: translateX(200%); }
        }

        .scan-line {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.7);
            transform: translateY(-100%);
            pointer-events: none;
            opacity: 0;
        }

        .group:hover .scan-line {
            animation: scan 4s linear infinite;
            opacity: 1;
        }

        /* Sincronización del Scrollbar de Navegación */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(5px); }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.6); border-radius: 2px; }

        /* Sello Monocromático: Glow Unificado en Blanco Puro para el Isotipo */
        .style-laser-white {
            filter: drop-shadow(0 1px 3px rgba(0, 0, 0, 0.4));
            transition: filter 0.5s ease;
        }
        .group:hover .style-laser-white {
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.9)) 
                    drop-shadow(0 0 15px rgba(255, 255, 255, 0.6));
        }

        /* Tipografía limpia sin saturación de sombras */
        .logo-text {
            font-weight: 900;
            letter-spacing: 0.3em;
            transition: color 0.5s ease, drop-shadow 0.5s ease;
        }

        /* Ocultar barra de scroll lateral en el contenedor del mapa */
        .scrollbar-none::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-none {
            -ms-overflow-style: none;  
            scrollbar-width: none;  
        }
    </style>
    <!-- Vinculamos tu script asíncrono para que inyecte las dependencias -->
    <script src="core-loader.js" defer></script>
</head>
<body class="antialiased selection:bg-blue-900">

    <!-- ANCLAJE DE INYECCIÓN DINÁMICA: NAV BAR SUPERIOR -->
    <div id="global-nav"></div>

    <main class="max-w-7xl mx-auto px-8 pt-10">

        <!-- SEASONAL NODE: CONTENEDOR INTERACTIVO DEL AVE -->
        <section id="seasonal-node" class="relative w-full min-h-[70vh] sm:min-h-screen bg-transparent flex justify-center items-center overflow-x-auto overflow-y-hidden select-none py-12 md:py-16 scrollbar-none">
            <!-- El script al final del documento seguirá inyectando el SVG aquí de manera asíncrona -->
            <div id="mesh-container" class="w-full min-w-[850px] sm:min-w-0 sm:max-w-[1100px] px-4 sm:px-6 relative z-10 flex justify-center items-center">
            </div>
        </section>

    </main>

    <!-- ANCLAJE DE INYECCIÓN DINÁMICA: PIE DE PÁGINA -->
    <div id="global-footer"></div>

<script>
    /**
     * Motor Local Contextual e Interacción Inmediata // ZENERGIA 2026
     */
    const $ = (id) => document.getElementById(id);

    // Captura el nodo del land-art y setea el estado del sistema
    function scrollToNodeID(nodeNumber) {
        const formattedNode = String(nodeNumber).padStart(3, '0');
        
        if ($('laser-variant-title')) {
            $('laser-variant-title').textContent = `NODO SELECCIONADO: #${formattedNode}`;
        }
        
        window.selectedNodeFromMesh = formattedNode;
        scrollToSection('dial-monitor');
    }

    function playBeat(url) {
        const audio = new Audio(url);
        audio.play().catch(() => {});
        if ("vibrate" in navigator) navigator.vibrate(50);
    }

    // Scroll fluido interno nativo para anclajes de la misma interfaz
    function scrollToSection(sectionId) {
        const target = $(sectionId);
        if (target) {
            target.scrollIntoView({ behavior: 'smooth' });
        }
    }

    // Cargar la matriz matemática (.svg del Ave Barranquero) de forma local e independiente
    document.addEventListener("DOMContentLoaded", () => {
        fetch('img/barranquero-mesh.svg')
            .then(response => {
                if (!response.ok) throw new Error("No se pudo obtener la bio-matriz vectorial");
                return response.text();
            })
            .then(data => {
                const container = $('mesh-container');
                if (container) container.innerHTML = data;
            })
            .catch(err => console.error('[-] Error cargando la bio-matriz vectorial:', err));
    });
</script>
</body>
</html>

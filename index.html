<!DOCTYPE html>

    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    screens: { 'xs': '400px' },
                    colors: { 'jako-black': '#0a0705' },
                    fontFamily: { 
                        'sans': ['Orbitron', 'sans-serif'],

        body { 
            font-family: 'Orbitron', sans-serif;

        .img-glow-transition {

        .scrollbar-none::-webkit-scrollbar { display: none; }
        .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }

</head>
<body class="antialiased selection:bg-white selection:text-black overflow-x-hidden bg-jako-black text-white">

                        ORDENAR VÍA WHATSAPP

                    <!-- Menú de Catálogo (Subido desde el Footer al bloque de control) -->
                    <div id="biorush-items-menu" class="flex items-center justify-center space-x-5 sm:space-x-6 text-center text-[9px] tracking-widest font-mono text-white/40 uppercase">
                    </div>

            </div>
        </div>

        <!-- FOOTER HUD UNIFICADO LABS -->

            <div class="p-4 sm:p-6 grid grid-cols-3 items-center max-w-7xl mx-auto uppercase tracking-widest font-mono text-[9px] text-white/40 min-h-[63px] sm:min-h-[69px] w-full">

    </main>

<script>

        'CAPS_24': {

            variants: {

                },

                    price: '$52.000', 
                    id: 'BR-03-ZEN',
                    dial: '1PUL7'
                },
                'STAMINA': { 
                    desc: 'Optimización del rendimiento energético celular.', 
                    label: 'CAPS 24 CORDYCEPS STAMINA',

    let currentBioItem = 'BIORUSH';
    let currentBioVariant = 'FOCUS';
    const numeroCelular = "573025333130";

    // ==========================================
    // 2. SISTEMA DE REVELADO (POINTERS & HAPTICS)
    // ==========================================
    function vincularBotonRevelado(btnId, frontImgId, backImgId, vectorId) {
        const btn = document.getElementById(btnId);
        const frontImg = document.getElementById(frontImgId);
        const backImg = document.getElementById(backImgId);
        const vectorSvg = document.getElementById(vectorId);

        if (!btn || !frontImg || !backImg) return;

        const mostrarReverso = (e) => {
            e.preventDefault();
            frontImg.style.opacity = '';
            backImg.style.opacity = '';
            
            frontImg.classList.remove('opacity-100');
            frontImg.classList.add('opacity-0', 'scale-[1.02]');
            
            backImg.classList.remove('opacity-0');
            backImg.classList.add('opacity-100', 'scale-[1.12]');
            
            if (vectorSvg) {
                vectorSvg.classList.add('opacity-0', 'pointer-events-none');
            }
            
            if (navigator.vibrate) navigator.vibrate(12);
        };

        const ocultarReverso = () => {
            frontImg.classList.remove('opacity-0', 'scale-[1.02]');
            frontImg.classList.add('opacity-100');
            
            backImg.classList.remove('opacity-100', 'scale-[1.12]');
            backImg.classList.add('opacity-0');
            
            if (vectorSvg) {
                vectorSvg.classList.remove('opacity-0', 'pointer-events-none');
            }
        };

        btn.addEventListener('pointerdown', mostrarReverso);
        btn.addEventListener('pointerup', ocultarReverso);
        btn.addEventListener('pointerleave', ocultarReverso);
        btn.addEventListener('touchstart', mostrarReverso, { passive: false });
        btn.addEventListener('touchend', ocultarReverso);
    }

    // ==========================================
    // 3. LÓGICA DE INTERFAZ BIORUSH
    // ==========================================
    function inicializarBioRush() {
        const menuContainer = document.getElementById('biorush-items-menu');
        if (menuContainer) {
            menuContainer.innerHTML = Object.keys(BIORUSH_CATALOG).map(item => `
                <span id="menu-bio-${item}" onclick="cambiarBioItem('${item}')" class="cursor-pointer tracking-[0.15em] transition-all duration-300 h-5 leading-none font-bold">
                    ${item}
                </span>
            `).join('');
        }
        
        vincularBotonRevelado('btn-reveal-bio', 'biorush-pack-img', 'biorush-pack-img-back', 'laser-vector-target');
        actualizarBioUI();
    }

    function cambiarBioItem(itemKey) {
        currentBioItem = itemKey;
        currentBioVariant = BIORUSH_CATALOG[itemKey].defaultVariant;
        actualizarBioUI();
        if (navigator.vibrate) navigator.vibrate(15);
    }

    function cambiarBioVariant(variantKey) {
        currentBioVariant = variantKey;
        actualizarBioUI();
        if (navigator.vibrate) navigator.vibrate(10);
    }

    function actualizarBioUI() {
        const itemConfig = BIORUSH_CATALOG[currentBioItem];
        const variantConfig = itemConfig.variants[currentBioVariant];
        
        const drawerNode = document.getElementById('drawer-vault-node');
        if (drawerNode) drawerNode.textContent = currentBioItem;

        const descEl = document.getElementById('biorush-description');
        const packImg = document.getElementById('biorush-pack-img');
        const packImgBack = document.getElementById('biorush-pack-img-back');
        
        if (descEl && packImg && packImgBack) {
            descEl.style.opacity = 0;
            packImg.style.opacity = 0;
            packImgBack.style.opacity = 0;

            setTimeout(() => {
                descEl.textContent = variantConfig.desc;
                packImg.src = variantConfig.img;
                packImgBack.src = variantConfig.imgBack;
                
                const labelTitle = document.getElementById('laser-variant-title');
                const specEl = document.getElementById('biorush-spec');
                const priceEl = document.getElementById('biorush-price');
                const dialEl = document.getElementById('hud-pulse-dial');
                
                if (labelTitle) labelTitle.textContent = variantConfig.label;
                if (specEl) specEl.textContent = variantConfig.spec;
                if (priceEl) priceEl.textContent = variantConfig.price;
                if (dialEl) dialEl.textContent = variantConfig.dial; // Actualización en caliente del Dial HUD
                
                descEl.style.opacity = 1;
                packImg.style.opacity = 1;
            }, 120);
        }

        Object.keys(BIORUSH_CATALOG).forEach(item => {
            const el = document.getElementById(`menu-bio-${item}`);
            if (el) {
                el.className = (item === currentBioItem) 
                    ? "cursor-pointer tracking-[0.15em] transition-all duration-300 h-5 leading-none font-bold text-white scale-105 border-b border-emerald-400 pb-0.5" 
                    : "cursor-pointer tracking-[0.15em] transition-all duration-300 h-5 leading-none text-white/40 hover:text-white/80";
            }
        });

        const variantContainer = document.getElementById('biorush-variants-container');
        if (variantContainer) {
            variantContainer.innerHTML = Object.keys(itemConfig.variants).map(vKey => {
                const isSelected = (vKey === currentBioVariant);
                return `
                    <span onclick="cambiarBioVariant('${vKey}')" 
                          class="cursor-pointer transition-all duration-300 px-3 py-1 bg-black/40 backdrop-blur-md rounded-sm border ${isSelected ? 'border-white text-white font-black shadow-[0_0_12px_rgba(255,255,255,0.1)]' : 'border-white/5 text-white/40 hover:border-white/20 hover:text-white/80'}">
                        ${vKey}
                    </span>
                `;
            }).join('');
        }
    }

    function adquirirNodo() {
        const variantConfig = BIORUSH_CATALOG[currentBioItem].variants[currentBioVariant];
        const mensaje = `⚡ *NUEVA ORDEN - BIORUSH* ⚡\n\n` +
                        `• *Ítem Base:* ${currentBioItem}\n` +
                        `• *Variante:* ${currentBioVariant}\n` +
                        `• *Especificación:* ${variantConfig.spec}\n` +
                        `• *Ref Label:* ${variantConfig.label}\n` +
                        `• *Precio:* ${variantConfig.price}\n` +
                        `• *PULS Dial:* \`${variantConfig.dial}\`\n` +
                        `• *ID Seguridad:* \`${variantConfig.id}\`\n\n` +
                        `Solicito la inicialización y el despacho inmediato de esta orden.`;

        const urlWhatsapp = `https://api.whatsapp.com/send?phone=${numeroCelular}&text=${encodeURIComponent(mensaje)}`;
        if (navigator.vibrate) navigator.vibrate([15, 40, 15]);
        window.open(urlWhatsapp, '_blank');
    }

    // Inicialización nativa al cargar DOM
    document.addEventListener('DOMContentLoaded', () => {
        inicializarBioRush();
    });
</script>

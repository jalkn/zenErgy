<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="img/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZENERGY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Plus+Jakarta+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    screens: { 'xs': '400px' },
                    colors: { 'jako-black': '#0a0705' },
                    fontFamily: { 
                        'sans': ['Orbitron', 'sans-serif'],
                        'mono': ['Orbitron', 'monospace'],
                        'body': ['Plus Jakarta Sans', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            font-family: 'Orbitron', sans-serif; 
            scroll-behavior: smooth; 
            letter-spacing: 0.05em; 
            background-color: #0a0705;
        } 
        #page-bg-overlay {
            position: fixed;
            inset: 0;
            z-index: -1;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            background: radial-gradient(circle at 50% 50%, #2f2e2e 0%, #0f0212 100%);
        }
        
        .img-glow-transition {
            transition: filter 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: filter, transform, opacity;
        }
        .scrollbar-none::-webkit-scrollbar { display: none; }
        .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="antialiased selection:bg-white selection:text-black overflow-x-hidden bg-jako-black text-white">

    <div id="page-bg-overlay"></div>
    <div class="fixed inset-0 bg-gradient-to-b from-black via-transparent to-black z-0 pointer-events-none"></div>

    <div id="drawer-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-md z-40 hidden opacity-0 transition-opacity duration-500"></div>

    <nav class="fixed top-0 w-full z-50 bg-gradient-to-b from-black/80 via-black/20 to-transparent backdrop-blur-md">
        <div class="p-4 sm:p-6 grid grid-cols-3 items-center max-w-7xl mx-auto uppercase tracking-widest font-mono text-[9px] text-white/40 min-h-[63px] sm:min-h-[69px] select-none">
            
            <div class="justify-self-start flex items-center space-x-3">
                <button id="z-logo-trigger" class="group w-9 h-9 flex items-center justify-center transition-all duration-300 focus:outline-none cursor-pointer" aria-label="Open Axis Drawer">
                    <img src="img/logo.png" class="w-5 h-5 object-contain img-glow-transition opacity-60 group-hover:opacity-100 group-hover:rotate-180 transition-all duration-500" alt="jako Axis Trigger"> 
                </button>
                <span id="telemetry-sphere-idx" class="tracking-[0.1em] text-white/70">
                    <span class="text-white/40">.⨀</span> 0000
                </span>
            </div>
            
            <div class="justify-self-center text-center tracking-[0.25em] font-bold drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] text-white/50">
                <span id=""></span>
            </div>
            
            <div class="justify-self-end flex items-center space-x-3">
                <span id="telemetry-active-node" class="tracking-[0.25em] text-right drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]">
                    ◯.0000
                </span>
                <button id="z-dial-trigger" class="group w-9 h-9 flex items-center justify-center transition-all duration-300 focus:outline-none cursor-pointer" aria-label="Open Pulsor Drawer">
                    <img src="img/back.png" class="w-5 h-5 object-contain opacity-60 group-hover:opacity-100 group-hover:scale-[1.05] transition-all duration-300 filter drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)]" alt="Pulsor Trigger">
                </button>
            </div>
            
        </div>
    </nav>

    <main class="w-full h-screen pt-[68px] pb-[69px] sm:pb-[81px] flex flex-col justify-center items-center overflow-hidden relative z-10">

<!-- ==========================================
     SECCIÓN 3: Z-BRICK (CENTRALIZADA + SIMETRÍA MONOLÍTICA)
     ========================================== -->
<section id="z-brick" class="group/brick-section flex flex-col items-center justify-center min-h-[85vh] py-24 px-4 bg-transparent overflow-hidden relative">
    
    <div class="relative z-10 flex flex-col items-center w-full max-w-3xl mx-auto text-center select-none">
        
        <!-- 1. EL RENDER: Centrado y escalado en el eje principal -->
        <div class="relative w-full max-w-[260px] sm:max-w-[320px] aspect-square flex justify-center items-center mb-8 relative">
            <!-- Aura / Glow de fondo al hacer hover a la sección -->
            <div class="absolute inset-0 bg-white/5 blur-[60px] md:blur-[90px] rounded-full opacity-0 group-hover/brick-section:opacity-100 transition-opacity duration-[1000ms] pointer-events-none"></div>
            
            <img src="img/node.png" 
                 alt="Z-Brick Mycelium"
                 class="w-full h-auto grayscale opacity-40 scale-95 filter drop-shadow-[0_15px_30px_rgba(0,0,0,0.7)]
                        transition-all duration-[1000ms] ease-out
                        group-hover/brick-section:grayscale-0 group-hover/brick-section:opacity-75 group-hover/brick-section:scale-105 group-hover/brick-section:drop-shadow-[0_20px_40px_rgba(255,255,255,0.1)]">
        </div>

        <!-- 2. ETIQUETA TÉCNICA SUPERIOR -->
        <div class="mb-4 bg-black/40 backdrop-blur-sm border border-white/5 px-4 py-1 rounded-sm drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)]">
            <span class="text-white/60 text-[9px] font-black tracking-[0.45em] uppercase">
                bioconstruction
            </span>
        </div>
        
        <!-- 3. TÍTULO CRÍTICO: Mismo peso que los encabezados del sistema -->
        <h2 class="text-4xl sm:text-6xl md:text-7xl font-black tracking-[0.15em] text-white uppercase mb-6 drop-shadow-[0_4px_12px_rgba(0,0,0,0.95)] transition-all duration-700 group-hover/brick-section:tracking-[0.18em]">
            Z_BRICK
        </h2>
        
        <!-- 4. DESCRIPCIÓN TÉCNICA NORMALIZADA (Estilo Consola de Estado / Dial) -->
        <p class="text-[11px] sm:text-[12px] text-white/80 tracking-[0.25em] font-medium max-w-xl uppercase leading-relaxed drop-shadow-[0_2px_4px_rgba(0,0,0,0.9)] mb-10">
            Bioladrillos de micelio sintetizado con residuo de amero.
        </p>

        <!-- 5. CONTENEDOR DE ACCIONES CON EL ESTILO DEL MENÚ SUPERIOR (Centrado Perfecto) -->
        <div class="flex flex-col sm:flex-row items-center justify-center gap-4 w-full max-w-xs relative z-30 px-4">
            <button onclick="adquirirNodo('Z_BRICK_DIRECTO')" class="w-full px-8 py-2.5 bg-[#141414]/60 backdrop-blur-md text-white font-black text-[11px] tracking-[0.22em] uppercase rounded-md border border-white/20 hover:border-white/60 hover:bg-[#141414]/80 transition-all duration-300 shadow-[0_0_15px_rgba(255,255,255,0.05)] hover:shadow-[0_0_20px_rgba(255,255,255,0.2)]">
                ORDENAR Z-BRICK
            </button>
        </div>
        
    </div>
</section>


    </main>

    <footer id="dynamic-footer" class="fixed bottom-0 left-0 w-full z-30 bg-gradient-to-t from-black/90 via-black/40 to-transparent backdrop-blur-md transition-opacity duration-500 select-none">
        <div class="p-4 sm:p-6 max-w-7xl mx-auto grid grid-cols-3 items-center w-full uppercase tracking-widest font-mono text-[9px] text-white/40 min-h-[63px] sm:min-h-[69px]">
            
            <div class="justify-self-start flex items-center space-x-2 sm:space-x-3 text-left">
                <button class="group w-9 h-9 flex items-center justify-center transition-all duration-300 focus:outline-none cursor-pointer" aria-label="Open Manifesto">
                    <img src="img/under.png" class="w-5 h-5 object-contain opacity-60 group-hover:opacity-100 group-hover:scale-[1.05] transition-all duration-300 filter drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)]" alt="Manifesto">
                </button>
                <span id="sub-sets-solar" class="transition-colors duration-300 cursor-pointer hover:text-white/80 whitespace-nowrap tracking-[0.15em] text-white/50 border-l border-white/10 pl-2 sm:pl-3 flex items-center h-5 leading-none">
                        0.00 Hz
                </span>
            </div>
            
            <div class="justify-self-center text-center tracking-[0.25em] drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]">
                <span id="z-dial">8UST11</span>
            </div>
            
            <div class="justify-self-end flex items-center space-x-2 sm:space-x-3">
                <button class="focus:outline-none transition-colors duration-300 hover:text-white/80 tracking-[0.25em] font-bold text-right drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] cursor-pointer">
                    <span id="sub-reps-tension" class="transition-colors duration-300 cursor-pointer hover:text-white/80 whitespace-nowrap text-right tracking-[0.25em] text-white/60">
                        00.0 N
                    </span>
                </button>
                <button class="group w-9 h-9 flex items-center justify-center transition-all duration-300 focus:outline-none cursor-pointer" aria-label="Open Vault Archive">
                    <img src="img/lift.png" class="w-5 h-5 object-contain opacity-60 group-hover:opacity-100 group-hover:scale-[1.05] transition-all duration-300 filter drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)]" alt="Open Vault">
                </button>
            </div>

        </div>
    </footer>

<script>
    const $ = (id) => document.getElementById(id);

    // Caché de elementos estáticos de UI
    let cachedElements = {};
    function getCachedEl(id) {
        if (!cachedElements[id]) {
            cachedElements[id] = $(id);
        }
        return cachedElements[id];
    }

    function calculateSphereIndex() {
        const epoch = new Date('2012-12-21T00:00:00Z'); 
        const daysSinceEpoch = Math.floor((new Date() - epoch) / 86400000);
        return `${String(daysSinceEpoch).padStart(4, '0')}.⨀`;
    }

    function updateZ() {
        let biokineticCoordinate = "";
        const now = new Date();
        const hours = now.getHours(); 
        const minutes = now.getMinutes();
        const seconds = now.getSeconds();

        const currentSphereIdx = calculateSphereIndex();
        
        // Actualización única de Índice de Esfera
        const elIdx = getCachedEl('telemetry-sphere-idx');
        if (elIdx && elIdx.textContent !== currentSphereIdx) elIdx.textContent = currentSphereIdx;

        let setsStage = 1;  
        let repsStage = 1;  
        let currentAction = 'P'; 

        // Generación de coordenadas por tiempo (Protocolo PULS)
        if (seconds % 2 !== 0) {
            const progress1s = now.getMilliseconds() / 1000; 
            setsStage = Math.floor(progress1s * 12) + 1;
            repsStage = 13 - setsStage; 

            if (progress1s < 0.25) currentAction = 'P';
            else if (progress1s < 0.5) currentAction = 'U';
            else if (progress1s < 0.75) currentAction = 'L';
            else currentAction = 'S';
        } else {
            setsStage = Math.floor((minutes % 12) + 1);
            
            if (seconds < 30) {
                const subSlot = Math.floor((seconds % 30) / 7.5);
                currentAction = ["PL", "PU", "LU", "SU"][subSlot] || "PL";
                repsStage = Math.floor((seconds % 10) + 2);
            } else {
                const subSlot = Math.floor(((seconds - 30) % 30) / 7.5);
                currentAction = ["PUL", "PLS", "LUP", "ULS"][subSlot] || "ULS";
                repsStage = Math.floor(((seconds - 30) % 10) + 3);
            }
        }
        setsStage = Math.max(1, Math.min(12, setsStage));
        repsStage = Math.max(1, Math.min(12, repsStage));
        biokineticCoordinate = `${setsStage}${currentAction}${repsStage}`;

        // Actualización de UI del Dial Central en Footer
        const elDial = getCachedEl('z-dial');
        if (elDial) elDial.textContent = biokineticCoordinate;
        
        // Actualización coordinada de Nodo Activo
        const activeNodeText = `◯.${String(Math.floor(((hours * 3600) + (minutes * 60) + seconds) / 10) + 1).padStart(4, '0')}`;
        const elActiveNode = getCachedEl('telemetry-active-node');
        if (elActiveNode) elActiveNode.textContent = activeNodeText;

        // Telemetría de la onda intermedia fija (12 variables) en el footer
        const subSetsSolar = getCachedEl('sub-sets-solar');
        const subRepsTension = getCachedEl('sub-reps-tension');
        if (subSetsSolar) subSetsSolar.textContent = `${(0.05 + (setsStage / 240)).toFixed(3)} Hz`;
        if (subRepsTension) subRepsTension.textContent = `${(14.2 + (repsStage * 0.8)).toFixed(1)} N`;
    }

    document.addEventListener("DOMContentLoaded", () => {        
        updateZ(); 
        setInterval(updateZ, 1000);
    });
</script>
</body>
</html>

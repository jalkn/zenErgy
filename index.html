<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link class="icon" type="image/png" href="img/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIORUSH.CO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Plus+Jakarta+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    screens: { 'xs': '400px' },
                    colors: { 'jako-black': '#0a0705' },
                    fontFamily: { 
                        'sans': ['Orbitron', 'sans-serif'],
                        'mono': ['Orbitron', 'monospace'],
                        'body': ['Plus Jakarta Sans', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            font-family: 'Orbitron', sans-serif; 
            scroll-behavior: smooth; 
            letter-spacing: 0.05em; 
            background-color: #0a0705;
        } 
        #page-bg-overlay {
            position: fixed;
            inset: 0;
            z-index: -1;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            background: radial-gradient(circle at 50% 50%, #2f2e2e 0%, #0f0212 100%);
        }
        
        .img-glow-transition {
            transition: filter 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: filter, transform, opacity;
        }
        .scrollbar-none::-webkit-scrollbar { display: none; }
        .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="antialiased selection:bg-white selection:text-black overflow-x-hidden bg-jako-black text-white">

    <div id="page-bg-overlay"></div>
    <div class="fixed inset-0 bg-gradient-to-b from-black via-transparent to-black z-0 pointer-events-none"></div>

    <main id="main-vault" class="w-full h-screen flex flex-col justify-between select-none text-white font-mono z-10 relative transition-all duration-500 ease-out overflow-hidden">

        <header class="w-full bg-gradient-to-b from-black/90 via-black/40 to-transparent backdrop-blur-md shrink-0 z-50">
            <div class="p-4 sm:p-6 grid grid-cols-3 items-center max-w-7xl mx-auto uppercase tracking-widest font-mono text-[9px] text-white/40 min-h-[63px] sm:min-h-[69px] w-full">
                <div id="telemetry-sphere-idx" class="justify-self-start flex items-center font-bold tracking-[0.15em]">
                    0000.⨀
                </div>
                <div class="justify-self-center text-center tracking-[0.25em] font-bold drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] text-white text-[10px] sm:text-[11px]">
                    <span id="drawer-vault-node">BIORUSH</span>
                </div>
                <div id="telemetry-active-node" class="justify-self-end flex items-center font-bold tracking-[0.15em]">
                    ◯.0000
                </div>
            </div>
        </header>

        <div class="w-full flex-1 overflow-y-auto scrollbar-none flex flex-col items-center justify-center py-2 px-4 text-center z-20 gap-2">
            
        <!-- CONTAINER DEL EMPAQUE (Tamaño general reducido un ~20%) -->
            <div id="biorush-pack-container" class="relative w-full max-w-[210px] xs:max-w-[240px] sm:max-w-[290px] md:max-w-[340px] aspect-[13/15] transition-all duration-700 ease-out select-none drop-shadow-[0_25px_35px_rgba(0,0,0,0.85)] z-10">
                <div class="w-full h-full relative overflow-hidden bg-transparent">
                    <img id="biorush-pack-img-back" src="img/back.png" alt="BioRush Pack Back" class="img-glow-transition absolute inset-0 w-full h-full object-contain scale-[1.05] sm:scale-[1.15] opacity-0 pointer-events-none z-0" />
                    <img id="biorush-pack-img" src="img/biorush.png" alt="BioRush Pack Front" class="img-glow-transition absolute inset-0 w-full h-full object-contain scale-[1.9] sm:scale-[1.8] pointer-events-none z-10" />
                    
                    <div class="absolute inset-0 flex items-center justify-center p-[2%] sm:p-[4%] z-20 pointer-events-none">
                        <svg id="laser-vector-target" viewBox="0 0 400 400" class="w-full h-full fill-none stroke-white/40 stroke-[1.5] transition-all duration-500 pointer-events-none">
                            <defs>
                                <path id="textPath-top" d="M 105,200 A 95,95 0 0,1 295,200" />
                                <path id="textPath-bottom" d="M 105,200 A 95,95 0 0,0 295,200" />
                            </defs>
                            <text class="fill-white font-black text-[9px] sm:text-[10px] tracking-[0.25em] sm:tracking-[0.3em] uppercase transition-all duration-500">
                                <textPath id="laser-variant-title" href="#textPath-top" startOffset="50%" text-anchor="middle">
                                    BIORUSH MENTAL FOCUS
                                </textPath>
                            </text>
                            
                            <g class="origin-center transform scale-[0.85]">
                                <path d="M 110,120 L 290,120 L 110,280 L 290,280 Z" class="opacity-20 stroke-[1.2]" />
                                <path d="M 110,120 Q 200,150 290,120" class="opacity-20 stroke-[1.2]" />
                                <path d="M 110,280 Q 200,250 290,280" stroke-dasharray="2 2" class="opacity-20 stroke-[1.2]" />
                                
                                <text x="200" y="165" text-anchor="middle" class="fill-white/30 text-[7px] tracking-[0.3em] font-bold uppercase"></text>
                                <text id="z-dial" x="200" y="215" text-anchor="middle" class="fill-white font-black text-[28px] tracking-[0.05em] font-sans">8UST11</text>
                                <text x="200" y="245" text-anchor="middle" class="fill-white/30 text-[6px] tracking-[0.4em] font-mono"></text>
                            </g>
                            
                            <text class="fill-white/60 font-black text-[8px] sm:text-[9px] tracking-[0.25em] uppercase transition-all duration-500">
                                <textPath href="#textPath-bottom" startOffset="50%" text-anchor="middle">
                                    BIORUSH.CO &bull; 3025333130
                                </textPath>
                            </text>
                        </svg>
                    </div>
                </div>
            </div>
            
            <!-- CONTENEDOR DE DETALLES (Ajustado proporcionalmente al nuevo tamaño) -->
            <div class="w-full flex flex-col items-center gap-1.5 -mt-10 sm:-mt-16 px-4 shrink-0 relative z-20">
                
                <button id="btn-reveal-bio" class="flex flex-col items-center gap-1 group focus:outline-none active:scale-95 transition-transform duration-200 relative z-30" aria-label="Revelar reverso">
                    <div class="w-7 h-7 rounded-full border border-emerald-500/30 flex items-center justify-center bg-emerald-950/20 group-hover:border-emerald-400 group-hover:bg-emerald-500/10 transition-all duration-300 shadow-[0_0_10px_rgba(16,185,129,0.05)]">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-3.5 h-3.5 text-white/70 group-hover:text-emerald-400 transition-colors">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                        </svg>
                    </div>
                </button>

                <p id="biorush-description" class="font-mono uppercase text-[9px] text-white/40 max-w-xl tracking-widest leading-relaxed min-h-[28px] transition-opacity duration-300">
                    Enfoque y claridad cognitiva.
                </p>

                <p class="font-mono uppercase text-[8px] text-emerald-400/60 tracking-[0.2em] -mt-1 mb-1">
                    Tu compra incluye un protocolo biocinético encriptado.
                </p>

                <div id="biorush-variants-container" class="flex flex-wrap items-center justify-center gap-2 text-[9px] tracking-widest font-mono select-none w-full max-w-md px-2">
                </div>

                <div class="flex items-center justify-center gap-4 font-mono text-[9px] tracking-widest text-white/40 uppercase mt-0.5">
                    <span id="biorush-spec">FLAN DE AVENA // LION’S MANE</span>
                    <span class="text-white/20">|</span>
                    <span id="biorush-price">$8.000</span>
                </div>

                <div class="w-full max-w-md pt-1 flex flex-col items-center gap-4">
                    <button onclick="adquirirNodo()" class="w-full sm:w-auto px-14 py-3 bg-[#141414]/80 backdrop-blur-md text-white font-black text-[12px] tracking-[0.22em] uppercase rounded-md border border-white/20 hover:border-white/70 hover:bg-[#141414] transition-all duration-300 shadow-[0_0_20px_rgba(255,255,255,0.05)] hover:shadow-[0_0_25px_rgba(255,255,255,0.25)]">
                        ORDENAR VÍA WHATSAPP
                    </button>
                    
                    <div id="biorush-items-menu" class="flex items-center justify-center space-x-5 sm:space-x-6 text-center text-[9px] tracking-widest font-mono text-white/40 uppercase">
                    </div>
                </div>
            </div>

        <footer class="w-full bg-gradient-to-t from-black/90 via-black/40 to-transparent backdrop-blur-md shrink-0 z-50">
            
            <div class="p-4 sm:p-6 grid grid-cols-3 items-center max-w-7xl mx-auto uppercase tracking-widest font-mono text-[9px] text-white/40 min-h-[63px] sm:min-h-[69px] w-full">
                <div id="sub-sets-solar" class="justify-self-start flex items-center font-bold tracking-[0.15em]">
                    0.00 Hz
                </div>    
                <div class="justify-self-center text-center tracking-[0.18em] font-bold text-white/50 hover:text-white transition-colors duration-300">
                    <a href="https://jako.world" target="_blank" rel="noopener noreferrer" class="hover:underline">
                    </a>
                </div>
                <div id="sub-reps-tension" class="justify-self-end flex items-center font-bold tracking-[0.15em]">
                    00.0 N
                </div>
            </div>
            
        </footer>
    </main>

<script>
    // =========================================================================
    // 1. CONFIGURACIÓN DE CATÁLOGOS COMERCIALES
    // =========================================================================
    const BIORUSH_CATALOG = {
        /*'BIORUSH': {
            defaultVariant: 'FOCUS',
            variants: {
                'FOCUS': { desc: 'Enfoque y claridad cognitiva.', label: 'BIORUSH METAL FOCUS', img: 'img/biorush.png', imgBack: 'img/back.png', spec: 'FLAN DE AVENA // LION’S MANE', price: '$8.000', id: 'BR-01-FOC' },
                'ZEN': { desc: 'Reducción del ruido mental.', label: 'BIORUSH MENTAL ZEN', img: 'img/biorush.png', imgBack: 'img/biorush_zen_back.png', spec: 'FLAN DE AVENA // REISHI', price: '$8.000', id: 'BR-01-ZEN' },
                'STAMINA': { desc: 'Optimización del rendimiento energético celular.', label: 'BIORUSH BODY STAMINA', img: 'img/biorush.png', imgBack: 'img/biorush_stamina_back.png', spec: 'FLAN DE AVENA // CORDYCEPS', price: '$8.000', id: 'BR-01-STA' },
                'CORE': { desc: 'Sincronización inmunológica integral.', label: 'BIORUSH BODY CORE', img: 'img/biorush.png', imgBack: 'img/biorush_core_back.png', spec: 'FLAN DE AVENA // TURKEY TAIL', price: '$8.000', id: 'BR-01-COR' }
            }
        }, */
        'CAPS_45': {
            defaultVariant: 'FOCUS',
            variants: {
                'FOCUS': { desc: 'Enfoque y claridad cognitiva.', label: 'CAPS 45 MENTAL FOCUS', img: 'img/caps.png', imgBack: 'img/item2_raw_back.png', spec: '45 CAPS // 500 MG', price: '$85.000', id: 'BR-02-FOC' },
                'ZEN': { desc: 'Reducción del ruido mental.', label: 'CAPS 45 MENTAL ZEN', img: 'img/caps.png', imgBack: 'img/item2_boost_back.png', spec: '45 CAPS // 500 MG', price: '$89.000', id: 'BR-02-ZEN' },
                'STAMINA': { desc: 'Optimización del rendimiento energético celular.', label: 'CAPS 45 BODY STAMINA', img: 'img/caps.png', imgBack: 'img/item2_stamina_back.png', spec: '45 CAPS // 500 MG', price: '$85.000', id: 'BR-02-STA' },
                'CORE': { desc: 'Sincronización inmunológica integral.', label: 'CAPS 45 BODY CORE', img: 'img/caps.png', imgBack: 'img/item2_core_back.png', spec: '45 CAPS // 500 MG', price: '$80.000', id: 'BR-02-COR' }
            }
        },
        'CAPS_24': {
            defaultVariant: 'FOCUS',
            variants: {
                'FOCUS': { desc: 'Enfoque y claridad cognitiva.', label: 'CAPS 24 LION’S MANE FOCUS', img: 'img/caps.png', imgBack: 'img/item3_calm_back.png', spec: '24 CAPS // 500 MG', price: '$48.000', id: 'BR-03-FOC' },
                'ZEN': { desc: 'Reducción del ruido mental.', label: 'CAPS 24 REISHI ZEN', img: 'img/caps.png', imgBack: 'img/item3_sleep_back.png', spec: '24 CAPS // 500 MG', price: '$52.000', id: 'BR-03-ZEN' },
                'STAMINA': { desc: 'Optimización del rendimiento energético celular.', label: 'CAPS 24 CORDYCEPS STAMINA', img: 'img/caps.png', imgBack: 'img/item3_stamina_back.png', spec: '24 CAPS // 500 MG', price: '$48.000', id: 'BR-03-STA' },
                'CORE': { desc: 'Sincronización inmunológica integral.', label: 'CAPS 24 TURKEY TAIL CORE', img: 'img/caps.png', imgBack: 'img/item3_core_back.png', spec: '24 CAPS // 500 MG', price: '$45.000', id: 'BR-03-COR' }
            }
        }
    };

    let currentBioItem = 'CAPS_45';
    let currentBioVariant = 'FOCUS';
    const numeroCelular = "573025333130";

    // ==========================================
    // 2. CACHÉ DE ELEMENTOS DE UI (OPTIMIZADO)
    // ==========================================
    const $ = (id) => document.getElementById(id);
    const cachedElements = {};
    
    function getCachedEl(id) {
        if (!cachedElements[id]) {
            cachedElements[id] = $(id);
        }
        return cachedElements[id];
    }

    const triggerHaptic = (ms) => { if (navigator.vibrate) navigator.vibrate(ms); };

    // ==========================================
    // 3. SISTEMA DE REVELADO (POINTER EVENTS)
    // ==========================================
    function vincularBotonRevelado(btnId, frontImgId, backImgId, vectorId) {
        const btn = getCachedEl(btnId);
        const frontImg = getCachedEl(frontImgId);
        const backImg = getCachedEl(backImgId);
        const vectorSvg = getCachedEl(vectorId);

        if (!btn || !frontImg || !backImg) return;

        const mostrarReverso = (e) => {
            e.preventDefault();
            frontImg.classList.replace('opacity-100', 'opacity-0');
            frontImg.classList.add('scale-[1.02]');
            backImg.classList.replace('opacity-0', 'opacity-100');
            backImg.classList.add('scale-[1.12]');
            if (vectorSvg) vectorSvg.classList.add('opacity-0', 'pointer-events-none');
            triggerHaptic(12);
        };

        const ocultarReverso = () => {
            frontImg.classList.replace('opacity-0', 'opacity-100');
            frontImg.classList.remove('scale-[1.02]');
            backImg.classList.replace('opacity-100', 'opacity-0');
            backImg.classList.remove('scale-[1.12]');
            if (vectorSvg) vectorSvg.classList.remove('opacity-0', 'pointer-events-none');
        };

        btn.addEventListener('pointerdown', mostrarReverso);
        btn.addEventListener('pointerup', ocultarReverso);
        btn.addEventListener('pointerleave', ocultarReverso);
    }

    // ==========================================
    // 4. CONTROLADORES DE INTERFAZ DE USUARIO
    // ==========================================
    function inicializarBioRush() {
        const menuContainer = getCachedEl('biorush-items-menu');
        if (menuContainer) {
            menuContainer.innerHTML = Object.keys(BIORUSH_CATALOG).map(item => `
                <span id="menu-bio-${item}" onclick="cambiarBioItem('${item}')" class="cursor-pointer tracking-[0.15em] transition-all duration-300 h-5 leading-none font-bold">
                    ${item}
                </span>
            `).join('');
        }
        
        vincularBotonRevelado('btn-reveal-bio', 'biorush-pack-img', 'biorush-pack-img-back', 'laser-vector-target');
        actualizarBioUI();
    }

    function cambiarBioItem(itemKey) {
        currentBioItem = itemKey;
        currentBioVariant = BIORUSH_CATALOG[itemKey].defaultVariant;
        actualizarBioUI();
        triggerHaptic(15);
    }

    function cambiarBioVariant(variantKey) {
        currentBioVariant = variantKey;
        actualizarBioUI();
        triggerHaptic(10);
    }

    function actualizarBioUI() {
        const itemConfig = BIORUSH_CATALOG[currentBioItem];
        const variantConfig = itemConfig.variants[currentBioVariant];
        
        const drawerNode = getCachedEl('drawer-vault-node');
        if (drawerNode) drawerNode.textContent = currentBioItem;

        const descEl = getCachedEl('biorush-description');
        const packImg = getCachedEl('biorush-pack-img');
        const packImgBack = getCachedEl('biorush-pack-img-back');
        
        if (descEl && packImg && packImgBack) {
            descEl.classList.add('opacity-0');
            packImg.classList.replace('opacity-100', 'opacity-0');
            packImgBack.classList.replace('opacity-100', 'opacity-0');

            setTimeout(() => {
                descEl.textContent = variantConfig.desc;
                packImg.src = variantConfig.img;
                packImgBack.src = variantConfig.imgBack;
                
                const labelTitle = getCachedEl('laser-variant-title');
                const specEl = getCachedEl('biorush-spec');
                const priceEl = getCachedEl('biorush-price');
                
                if (labelTitle) labelTitle.textContent = variantConfig.label;
                if (specEl) specEl.textContent = variantConfig.spec;
                if (priceEl) priceEl.textContent = variantConfig.price;
                
                descEl.classList.remove('opacity-0');
                packImg.classList.replace('opacity-0', 'opacity-100');
            }, 120);
        }

        Object.keys(BIORUSH_CATALOG).forEach(item => {
            const el = getCachedEl(`menu-bio-${item}`);
            if (el) {
                el.className = (item === currentBioItem) 
                    ? "cursor-pointer tracking-[0.15em] transition-all duration-300 h-5 leading-none font-bold text-white scale-105 border-b border-emerald-400 pb-0.5" 
                    : "cursor-pointer tracking-[0.15em] transition-all duration-300 h-5 leading-none text-white/40 hover:text-white/80";
            }
        });

        const variantContainer = getCachedEl('biorush-variants-container');
        if (variantContainer) {
            variantContainer.innerHTML = Object.keys(itemConfig.variants).map(vKey => {
                const isSelected = (vKey === currentBioVariant);
                return `
                    <span onclick="cambiarBioVariant('${vKey}')" 
                          class="cursor-pointer transition-all duration-300 px-3 py-1 bg-black/40 backdrop-blur-md rounded-sm border ${isSelected ? 'border-white text-white font-black shadow-[0_0_12px_rgba(255,255,255,0.1)]' : 'border-white/5 text-white/40 hover:border-white/20 hover:text-white/80'}">
                        ${vKey}
                    </span>
                `;
            }).join('');
        }
    }

    // =========================================================================
    // 5. MOTOR DE TELEMETRÍA (PROTOCOLO PULS)
    // =========================================================================
    function calculateSphereIndex() {
        const epoch = new Date('2012-12-21T00:00:00Z'); 
        const daysSinceEpoch = Math.floor((new Date() - epoch) / 86400000);
        return `${String(daysSinceEpoch).padStart(4, '0')}.⨀`;
    }

    function updateZ() {
        let biokineticCoordinate = "";
        const now = new Date();
        const hours = now.getHours(); 
        const minutes = now.getMinutes();
        const seconds = now.getSeconds();

        const currentSphereIdx = calculateSphereIndex();
        
        const elIdx = getCachedEl('telemetry-sphere-idx');
        if (elIdx && elIdx.textContent !== currentSphereIdx) elIdx.textContent = currentSphereIdx;

        let setsStage = 1;  
        let repsStage = 1;  
        let currentAction = 'P'; 

        if (seconds % 2 !== 0) {
            const progress1s = now.getMilliseconds() / 1000; 
            setsStage = Math.floor(progress1s * 12) + 1;
            repsStage = 13 - setsStage; 

            if (progress1s < 0.25) currentAction = 'P';
            else if (progress1s < 0.5) currentAction = 'U';
            else if (progress1s < 0.75) currentAction = 'L';
            else currentAction = 'S';
        } else {
            setsStage = Math.floor((minutes % 12) + 1);
            
            if (seconds < 30) {
                const subSlot = Math.floor((seconds % 30) / 7.5);
                currentAction = ["PL", "PU", "LU", "SU"][subSlot] || "PL";
                repsStage = Math.floor((seconds % 10) + 2);
            } else {
                const subSlot = Math.floor(((seconds - 30) % 30) / 7.5);
                currentAction = ["PUL", "PLS", "LUP", "ULS"][subSlot] || "ULS";
                repsStage = Math.floor(((seconds - 30) % 10) + 3);
            }
        }
        setsStage = Math.max(1, Math.min(12, setsStage));
        repsStage = Math.max(1, Math.min(12, repsStage));
        biokineticCoordinate = `${setsStage}${currentAction}${repsStage}`;

        const elDial = getCachedEl('z-dial');
        if (elDial) elDial.textContent = biokineticCoordinate;
        
        const activeNodeText = `◯.${String(Math.floor(((hours * 3600) + (minutes * 60) + seconds) / 10) + 1).padStart(4, '0')}`;
        const elActiveNode = getCachedEl('telemetry-active-node');
        if (elActiveNode) elActiveNode.textContent = activeNodeText;

        const subSetsSolar = getCachedEl('sub-sets-solar');
        const subRepsTension = getCachedEl('sub-reps-tension');
        if (subSetsSolar) subSetsSolar.textContent = `${(0.05 + (setsStage / 240)).toFixed(3)} Hz`;
        if (subRepsTension) subRepsTension.textContent = `${(14.2 + (repsStage * 0.8)).toFixed(1)} N`;
    }

    // =========================================================================
    // 6. CAPTURA DE TELEMETRÍA DE COMPRA (GENERACIÓN DE PAYLOAD)
    // =========================================================================
    function adquirirNodo() {
        const variantConfig = BIORUSH_CATALOG[currentBioItem].variants[currentBioVariant];
        const currentCoord = getCachedEl('z-dial')?.textContent || "N/A";
        
        const mensaje = `⚡ *NUEVA ORDEN - BIORUSH* ⚡\n\n` +
                        `• *Ítem Base:* ${currentBioItem}\n` +
                        `• *Variante:* ${currentBioVariant}\n` +
                        `• *Especificación:* ${variantConfig.spec}\n` +
                        `• *Ref Label:* ${variantConfig.label}\n` +
                        `• *Precio:* ${variantConfig.price}\n` +
                        `• *Coordenada Bioléctrica:* \`${currentCoord}\`\n` +
                        `• *ID Seguridad:* \`${variantConfig.id}\`\n\n` +
                        `Solicito la inicialización y el despacho inmediato de esta orden.`;

        triggerHaptic([15, 40, 15]);
        window.open(`https://api.whatsapp.com/send?phone=${numeroCelular}&text=${encodeURIComponent(mensaje)}`, '_blank');
    }

    // Inicialización coordinada del Ciclo de Vida del DOM
    document.addEventListener('DOMContentLoaded', () => {
        inicializarBioRush();
        updateZ(); 
        setInterval(updateZ, 1000);
    });
</script>
</body>
</html>
